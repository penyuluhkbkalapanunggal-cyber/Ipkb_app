{% extends 'layout.html' %}

{% block content %}

<div class="space-y-6">

    <div>
        <h1 class="text-2xl font-bold text-slate-800">
            Upload Excel Kegiatan PKB
        </h1>

        <p class="text-sm text-slate-500">
            Hanya file Excel (.xlsx / .xls)
        </p>
    </div>

    <div class="glass-card rounded-2xl shadow p-6">

        <form method="POST"
              enctype="multipart/form-data">

            <div class="mb-5">

                <label class="block text-sm font-semibold mb-2">
                    File Excel
                </label>

                <input type="file"
                       name="file_excel"
                       accept=".xlsx,.xls"
                       required
                       class="w-full border rounded-xl p-3">

            </div>

            <button type="submit"
                    class="btn btn-blue">

                <i class="fa-solid fa-upload"></i>
                Upload Excel

            </button>

            <a href="/kegiatan_pkb"
               class="btn btn-red ml-2">

                Kembali

            </a>

        </form>

    </div>

</div>

{% endblock %}
