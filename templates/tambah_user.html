{% extends 'layout.html' %}
{% block content %}
<h2 class="text-2xl font-bold mb-4 text-blue-700"><i class="fa-solid fa-user-plus mr-2"></i>Tambah User</h2>
<form method="POST" enctype="multipart/form-data" class="bg-white p-6 rounded-2xl shadow max-w-lg space-y-3">
    <input type="text" name="nama" placeholder="Nama" class="border p-3 w-full rounded-xl" required>
    <input type="text" name="nip" placeholder="NIP" class="border p-3 w-full rounded-xl" required>
    <input type="text" name="no_hp" placeholder="No HP / WhatsApp contoh 08123456789" class="border p-3 w-full rounded-xl">
    <input type="password" name="password" placeholder="Password" class="border p-3 w-full rounded-xl" required>
    <select name="role" class="border p-3 w-full rounded-xl" required>
        <option value="anggota">Anggota</option><option value="user">User</option><option value="bendahara">Bendahara</option><option value="admin">Admin</option>
    </select>
    <input type="file" name="foto" class="w-full text-sm">
    <div class="flex gap-2"><button class="btn btn-blue"><i class="fa-solid fa-floppy-disk"></i>Simpan</button><a href="/users" class="btn bg-gray-200"><i class="fa-solid fa-arrow-left"></i>Kembali</a></div>
</form>
{% endblock %}
